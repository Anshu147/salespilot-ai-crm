info:
  name: register
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/register"
  body:
    type: json
    data: |-
      {
        "organization": {
          "name": "Acme Technologies"
        },
        "user": {
          "firstName": "Sales",
          "lastName": "Person",
          "email": "sales@example.com",
          "password": "Password@123"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
